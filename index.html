<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Player One | Portfolio</title>
  <meta name="description" content="A personal portfolio, resume snapshot, and static blog with a retro CRT-inspired aesthetic.">
  <link rel="stylesheet" href="assets/css/site.css">
  <script src="assets/js/theme.js" defer></script>
</head>
<body>
  <header class="site-header site-shell panel">
    <a class="brand" href="./">PLAYER ONE</a>
    <nav class="site-nav" aria-label="Primary">
      <a href="#about">About</a>
      <a href="#links">Links</a>
      <a href="blog/">Blog</a>
      <a href="#contact">Contact</a>
    </nav>
    <div class="theme-switcher" role="group" aria-label="Theme">
